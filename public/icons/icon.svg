<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#2563eb"/>
  <!-- Scan lines (document + scanner aesthetic) -->
  <rect x="136" y="128" width="240" height="16" rx="8" fill="white" opacity="0.3"/>
  <rect x="136" y="168" width="240" height="8" rx="4" fill="white" opacity="0.2"/>
  <rect x="136" y="192" width="180" height="8" rx="4" fill="white" opacity="0.2"/>
  <!-- Document outline -->
  <rect x="136" y="112" width="240" height="288" rx="16" fill="none" stroke="white" stroke-width="12" opacity="0.5"/>
  <!-- Scan beam -->
  <rect x="136" y="248" width="240" height="6" rx="3" fill="white"/>
  <!-- Corner brackets (scanner UI) -->
  <path d="M136 220 L136 248 L164 248" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M376 220 L376 248 L348 248" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Initials -->
  <text x="256" y="430" font-family="system-ui, -apple-system, Arial, sans-serif" font-size="80" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="auto" opacity="0.9">ES</text>
</svg>
